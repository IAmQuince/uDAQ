name: ci

on:
  push:
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run current quality gate
        run: |
          python -m tools.audit.run_master_audit --package-root . --profile package-normalization
          python -m tools.governance.validate_document_impact --package-root .
          python -m tools.governance.validate_package_entry_surfaces --package-root .
          python -m tools.governance.validate_readme_control --package-root .
          python -m tools.governance.validate_document_debt --package-root .
          python -m tools.package_build.validate_windows_path_budget --package-root . --delivery-root udq_s02b_r01
          python -m tools.dev.run_session_checkpoint_smoke --package-root .
          python -m tools.diagnostics.dump_session_replay_evidence --package-root . --output audit_reports/testing/session_replay_evidence.json
          python -m tools.dev.run_shell_smoke --package-root .
          rm -rf .ruff_cache
          python -m pytest tests/ -q

  simulated-u6-smoke:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run simulated LabJack U6 smoke path
        run: python -m tools.dev.run_labjack_u6_smoke --package-root .
